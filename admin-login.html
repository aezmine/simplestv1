<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MinPanda Food</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="minpanda-header">
        <a href="index.html">🏠 Home</a>
        <a href="customer.html">🍔 Order Food</a>
        <a href="queue.html">📋 Queue</a>
        <a href="admin-login.html">⚙️ Admin</a>
    </header>
    <hr class="minpanda-divider">

    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-icon">🐼🔐</div>
            <h1>Admin Access</h1>
            <p>Enter your password to manage the system</p>
            <p>Aku Je woi Boleh masuk</p>

            <div class="input-group">
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter Password"
                />
            </div>

            <button class="login-btn" onclick="login()">
                Login
            </button>
        </div>
    </main>

    <footer class="minpanda-footer">
        <p>
            <span class="copyleft">&copy;</span> copyleft by min - 2026
        </p>
    </footer>

    <script type="module" src="admin-login.js"></script>
</body>
</html>
