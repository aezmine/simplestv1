<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinPanda Food - Order</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="minpanda-header">
        <a href="index.html">🏠 Home</a>
        <a href="customer.html">🍔 Order Food</a>
        <a href="queue.html">📋 Queue</a>
        <a href="reviews.html">⭐ Reviews</a>
        <a href="food-advisor.html">🤖 AI Advisor</a>
        <a href="admin-login.html">⚙️ Admin</a>
    </header>
    <hr class="minpanda-divider">

    <main class="page-content">
        <h3>Select Your Food</h3>

        <div class="food-grid">
            <div class="food-card" data-food="Geprek Farisz Bistro">
                <div class="check-badge">✓</div>
                <img src="assets/p1.jpg" alt="">
                <p>Geprek Farisz Bistro</p>
            </div>

            <div class="food-card" data-food="Nasi Arab Limbong">
                <div class="check-badge">✓</div>
                <img src="assets/p2.jpg" alt="">
                <p>Nasi Arab Limbong</p>
            </div>

            <div class="food-card" data-food="Nasi Ayam Limbong">
                <div class="check-badge">✓</div>
                <img src="assets/p3.jpg" alt="">
                <p>Nasi Ayam Limbong</p>
            </div>

            <div class="food-card" data-food="Burger Apiq">
                <div class="check-badge">✓</div>
                <img src="assets/p4.jpg" alt="">
                <p>Burger Apiq</p>
            </div>

            <div class="food-card" data-food="Burger Ngosek">
                <div class="check-badge">✓</div>
                <img src="assets/p5.jpg" alt="">
                <p>Burger Ngosek</p>
            </div>

            <div class="food-card" data-food="Nasi Kandar Pak Damat">
                <div class="check-badge">✓</div>
                <img src="assets/p6.jpg" alt="">
                <p>Nasi Kandar Pak Damat</p>
            </div>

            <div class="food-card" data-food="Sri Andaman">
                <div class="check-badge">✓</div>
                <img src="assets/p7.jpg" alt="">
                <p>Sri Andaman</p>
            </div>

            <div class="food-card custom-food-card" data-food="CUSTOM">
                <div class="check-badge">✓</div>
                <div style="
                    height:120px;
                    border-radius:12px;
                    background:#f0f0f0;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    margin-bottom:12px;
                    font-size:40px;
                ">
                    ✏️
                </div>
                <p>Custom Order</p>
            </div>
        </div>

        <input type="hidden" id="food">

        <div class="selection-panel">
            <p>Currently Selected:</p>
            <span id="selectedFood">None</span>
        </div>

        <div id="customFoodContainer" style="display:none; margin-top:15px;">
            <input
                id="customFood"
                placeholder="Contoh: Nasi Goreng Telur, Air Milo Ais..."
            >
        </div>

        <br>

        <input
            id="name"
            placeholder="Enter Name"
        >

        <textarea
            id="customerNote"
            rows="4"
            placeholder="Pesanan tambahan (contoh: tak nak sayur, extra kuah)"
        ></textarea>

        <br><br>

        <button class="submit-btn" onclick="submitOrder()">
            Submit Order
        </button>
    </main>

    <footer class="minpanda-footer">
        <p>
            <span class="copyleft">&copy;</span> copyleft by min - 2026
        </p>
    </footer>

    <script type="module" src="customer.js"></script>
</body>
</html>
